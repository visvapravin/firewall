default_action: deny
segments:
  web-1.internal: web-tier
  web-2.internal: web-tier
  db.internal: data-tier
nat_table:
  203.0.113.10:443: web-1.internal
  203.0.113.11:443: web-2.internal
rules:
- id: allow-corp-to-web1-https
  source_cidr: 10.10.0.0/16
  destination: web-1.internal
  protocol: tcp
  destination_port: 443
  action: allow
  description: Allow corporate subnet to HTTPS on web-1
- id: allow-corp-to-web2-https
  source_cidr: 10.10.0.0/16
  destination: web-2.internal
  protocol: tcp
  destination_port: 443
  action: allow
  description: Allow corporate subnet to HTTPS on web-2
- id: deny-public-to-data
  source_cidr: 0.0.0.0/0
  destination: db.internal
  protocol: tcp
  destination_port: 5432
  action: deny
  description: Explicitly deny public access to database
