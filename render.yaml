services:
  - type: web
    name: virtual-firewall
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn --app-dir src api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONPATH
        value: src
